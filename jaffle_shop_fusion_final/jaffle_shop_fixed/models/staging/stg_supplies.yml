version: 2

models:
  - name: stg_supplies
    description: >
      Supply expense data. One row per supply cost record.
      Multiple rows per supply_id as costs change over time.
    columns:
      - name: supply_uuid
        description: Primary key — surrogate key from supply_id + product_id.
        data_tests:
          - not_null
          - unique
      - name: supply_id
        data_tests:
          - not_null
      - name: product_id
        description: Foreign key to the product this supply is used in.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id
      - name: supply_name
        data_tests:
          - not_null
      - name: supply_cost
        data_tests:
          - not_null
          - is_positive
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000
      - name: is_perishable_supply
        data_tests:
          - not_null
