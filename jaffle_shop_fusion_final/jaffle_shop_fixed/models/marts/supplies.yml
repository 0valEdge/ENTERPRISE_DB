version: 2

models:
  - name: supplies
    description: >
      Supplies dimension table. One row per supply cost record per product SKU.
      Multiple rows per supply_id as costs change over time.

    semantic_model:
      enabled: true

    columns:
      - name: supply_uuid
        description: Primary key — surrogate key combining supply_id and product_id.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: supply

      - name: supply_id
        description: Natural key for the supply item.
        dimension:
          type: categorical

      - name: product_id
        description: Foreign key to the product this supply is used in.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: product

      - name: supply_name
        description: Name of the supply item.
        dimension:
          type: categorical

      - name: is_perishable_supply
        description: True if the supply item is perishable.
        dimension:
          type: categorical

      - name: supply_cost
        description: Cost of this supply item in USD.
        data_tests:
          - not_null
          - is_positive

    metrics:
      - name: total_supply_cost
        label: Total Supply Cost
        description: Sum of all supply costs across all products.
        type: simple
        agg: sum
        expr: supply_cost

      - name: perishable_supply_cost
        label: Perishable Supply Cost
        description: Sum of supply costs for perishable items only.
        type: simple
        agg: sum
        expr: supply_cost
        filter: "{{ Dimension('supply__is_perishable_supply') }} = true"

      - name: avg_supply_cost
        label: Average Supply Cost
        description: Average cost per supply record.
        type: simple
        agg: average
        expr: supply_cost
