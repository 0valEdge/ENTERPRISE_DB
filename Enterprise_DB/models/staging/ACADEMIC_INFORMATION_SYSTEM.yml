version: 2

sources:
  - name: ACADEMIC_INFORMATION_SYSTEM
    description: Source tables from the Academic Information System
    database: ACADEMICMANAGEMENT
    schema: STG_ACADEMICMANAGEMENT


    tables:

      # ===================== ADMISSIONS =====================
      - name: ADMISSIONS
        description: Admissions information

        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "ADMISSION_DATE <= current_date"

        columns:
          - name: ADMISSION_ID
            tests:
              - not_null
              - unique

          - name: STUDENT_ID
            tests:
              - not_null
              - relationships:
                 arguments:
                   to: source('ACADEMIC_INFORMATION_SYSTEM', 'STUDENTS')
                   field: STUDENT_ID

          - name: ADMISSION_STATUS
            tests:
              - accepted_values:
                  arguments:
                    values: ['approved', 'pending', 'rejected']

          - name: ADMISSION_DATE
            tests:
              - not_null

      # ===================== COURSES =====================
      - name: COURSES
        description: Course details

        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "CREDITS > 0"

        columns:
          - name: COURSE_ID
            tests:
              - not_null
              - unique

          - name: DEPARTMENT_ID
            tests:
              - relationships:
                  arguments:
                     to: source('ACADEMIC_INFORMATION_SYSTEM', 'DEPARTMENTS')
                     field: DEPARTMENT_ID

          - name: CREDITS
            tests:
              - dbt_utils.accepted_range:
                  arguments:
                    min_value: 1
                    max_value: 10

          - name: COURSE_CODE
            tests:
              - not_null

      # ===================== DEPARTMENTS =====================
      - name: DEPARTMENTS
        description: Department details

        columns:
          - name: _FIVETRAN_ID
            tests:
              - not_null
              - unique

          - name: DEPARTMENT_ID
            tests:
              - not_null

          - name: DEPARTMENT_NAME
            tests:
              - not_null

      # ===================== ENROLLMENTS =====================
      - name: ENROLLMENTS
        description: Student enrollments

        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "COURSESTARTDATE <= COURSEENDDATE"

        columns:
          - name: _FIVETRAN_ID
            tests:
              - not_null
              - unique

          - name: STUDENT_ID
            tests:
              - relationships:
                  arguments:
                    to: source('ACADEMIC_INFORMATION_SYSTEM', 'STUDENTS')
                    field: STUDENT_ID

          - name: COURSE_ID
            tests:
              - relationships:
                  arguments:
                    to: source('ACADEMIC_INFORMATION_SYSTEM', 'COURSES')
                    field: COURSE_ID

          - name: ENROLLMENTSTATUS
            tests:
              - accepted_values:
                  arguments:
                    values: ['active', 'completed', 'dropped']

          - name: GRADE
            tests:
              - accepted_values:
                  arguments:
                    values: ['A', 'B', 'C', 'D', 'F']

      # ===================== STUDENTS =====================
      - name: STUDENTS
        description: Student information

        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "DATE_OF_BIRTH < current_date"

        columns:
          - name: _FIVETRAN_ID
            tests:
              - not_null
              - unique

          - name: STUDENT_ID
            tests:
              - not_null
              - unique

          - name: DEPARTMENT_ID
            tests:
              - relationships:
                 arguments:
                   to: source('ACADEMIC_INFORMATION_SYSTEM', 'DEPARTMENTS')
                   field: DEPARTMENT_ID

          - name: GENDER
            tests:
              - accepted_values:
                  arguments:
                    values: ['male', 'female', 'other']