version: 2

models:
  - name: location_performance
    description: >
      Location performance fact table. One row per store location with
      aggregated revenue, cost, margin, and customer metrics.

    semantic_model:
      enabled: true

    agg_time_dimension: first_order_at

    columns:
      - name: location_id
        description: Primary key — unique store location identifier.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: location

      - name: location_name
        description: Store name.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: first_order_at
        description: Date of the first order placed at this location.
        granularity: day
        dimension:
          type: time

      - name: last_order_at
        description: Date of the most recent order at this location.
        granularity: day
        dimension:
          type: time

      - name: opened_date
        description: Date the location was opened.
        granularity: day
        dimension:
          type: time

      - name: total_revenue
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: total_orders
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: unique_customers
        data_tests:
          - not_null

      - name: total_gross_margin
      - name: total_cost
      - name: avg_item_price
      - name: food_revenue
      - name: drink_revenue
      - name: tax_rate
      - name: gross_margin_pct

    metrics:
      - name: location_total_revenue
        label: Location Total Revenue
        description: Sum of total revenue across all locations.
        type: simple
        agg: sum
        expr: total_revenue

      - name: location_total_orders
        label: Location Total Orders
        description: Sum of total orders across all locations.
        type: simple
        agg: sum
        expr: total_orders

      - name: location_unique_customers
        label: Location Unique Customers
        description: Sum of unique customers across all locations.
        type: simple
        agg: sum
        expr: unique_customers

      - name: location_gross_margin
        label: Location Gross Margin
        description: Sum of gross margin across all locations.
        type: simple
        agg: sum
        expr: total_gross_margin

      - name: location_food_revenue
        label: Location Food Revenue
        description: Sum of food revenue across all locations.
        type: simple
        agg: sum
        expr: food_revenue

      - name: location_drink_revenue
        label: Location Drink Revenue
        description: Sum of drink revenue across all locations.
        type: simple
        agg: sum
        expr: drink_revenue
