version: 2

models:
  - name: product_performance
    description: >
      Product performance fact table. One row per product with aggregated
      revenue, margin, units sold, and order counts across all time.

    semantic_model:
      enabled: true

    agg_time_dimension: first_sold_at

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_revenue >= total_supply_cost"

    columns:
      - name: product_id
        description: Primary key — unique product identifier.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: product

      - name: product_name
        description: Product display name.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: product_type
        description: Product category type.
        dimension:
          type: categorical

      - name: is_food_item
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: is_drink_item
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: first_sold_at
        description: Date the product was first sold.
        granularity: day
        dimension:
          type: time

      - name: last_sold_at
        description: Date the product was most recently sold.
        granularity: day
        dimension:
          type: time

      - name: total_units_sold
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: total_revenue
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: total_supply_cost
        data_tests:
          - not_null

      - name: total_gross_margin
        data_tests:
          - not_null

      - name: gross_margin_pct
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -100
                max_value: 100

      - name: avg_selling_price
      - name: avg_gross_margin
      - name: total_orders
      - name: unique_customers

    metrics:
      - name: total_product_revenue
        label: Total Product Revenue
        description: Sum of revenue across all products.
        type: simple
        agg: sum
        expr: total_revenue

      - name: total_units_sold
        label: Total Units Sold
        description: Sum of units sold across all products.
        type: simple
        agg: sum
        expr: total_units_sold

      - name: total_product_gross_margin
        label: Total Product Gross Margin
        description: Sum of gross margin across all products.
        type: simple
        agg: sum
        expr: total_gross_margin

      - name: total_product_supply_cost
        label: Total Product Supply Cost
        description: Sum of supply costs across all products.
        type: simple
        agg: sum
        expr: total_supply_cost
