version: 2

exposures:

  - name: executive_revenue_dashboard
    tags: ['executive','revenue']
    label: Executive Revenue Dashboard
    type: dashboard
    maturity: high
    url: https://bi.jaffle.shop/dashboards/revenue
    description: >
      Executive-facing dashboard showing top-line revenue, order volume,
      and gross margin trends. Refreshed daily. Used in weekly leadership reviews.
    depends_on:
      - ref('orders')
      - ref('customers')
      - ref('location_performance')
      - metric('order_total')
      - metric('orders')
      - metric('revenue')
    owner:
      name: Data Team
      email: data@jaffle.shop

  - name: product_performance_report
    label: Product Performance Report
    type: dashboard
    maturity: medium
    url: https://bi.jaffle.shop/dashboards/products
    description: >
      Weekly product performance report showing top and bottom performing
      products by revenue, margin, and units sold. Used by the merchandising team.
    depends_on:
      - ref('product_performance')
      - ref('order_items')
      - metric('total_product_revenue')
      - metric('total_units_sold')
      - metric('total_product_gross_margin')
    owner:
      name: Merchandising Team
      email: merch@jaffle.shop
    tags:
      - product
      - merchandising

  - name: location_ops_dashboard
    label: Location Operations Dashboard
    type: dashboard
    maturity: medium
    url: https://bi.jaffle.shop/dashboards/locations
    description: >
      Store-level operational dashboard tracking revenue, order counts,
      and customer counts per location. Used by store managers.
    depends_on:
      - ref('location_performance')
      - metric('location_total_revenue')
      - metric('location_total_orders')
      - metric('location_unique_customers')
    owner:
      name: Operations Team
      email: ops@jaffle.shop
    tags:
      - operations
      - location

  - name: customer_retention_analysis
    label: Customer Retention & Cohort Analysis
    type: analysis
    maturity: low
    url: https://bi.jaffle.shop/dashboards/retention
    description: >
      Cohort-based customer retention analysis used by the growth team
      to understand repeat purchase behaviour and lifetime value trends.
    depends_on:
      - ref('customer_cohorts')
      - ref('customers')
      - metric('count_lifetime_orders')
      - metric('lifetime_spend_pretax')
      - metric('average_order_value')
    owner:
      name: Growth Team
      email: growth@jaffle.shop
    tags:
      - retention
      - cohort
      - growth

  - name: finance_revenue_export
    label: Finance Revenue Export
    type: ml
    maturity: high
    url: https://bi.jaffle.shop/exports/finance
    description: >
      Automated daily export of revenue and tax data to the Finance team's
      accounting system. Critical for month-end close. Any changes to
      orders or customers models must be reviewed by Finance before deployment.
    depends_on:
      - ref('orders')
      - ref('customers')
      - ref('location_performance')
    owner:
      name: Finance Team
      email: finance@jaffle.shop
    tags:
      - finance
      - critical

  - name: customer_segmentation_tool
    label: Customer Segmentation Tool
    type: application
    maturity: medium
    url: https://bi.jaffle.shop/tools/segmentation
    description: >
      Internal marketing tool that reads RFM segments to build targeted
      email and push notification campaigns. Pulls champion and at-risk
      segments daily to drive re-engagement workflows.
    depends_on:
      - ref('customer_rfm_segments')
      - metric('champion_customers')
      - metric('at_risk_customers')
      - metric('customer_health_ratio')
    owner:
      name: Marketing Team
      email: marketing@jaffle.shop
    tags:
      - marketing
      - segmentation
      - crm

  - name: daily_ops_alert
    label: Daily Operations Alert
    type: application
    maturity: high
    url: https://bi.jaffle.shop/alerts/daily-ops
    description: >
      Automated Slack alert sent every morning to store managers with
      yesterday's revenue, order count, and rolling 7-day trend per location.
      Depends on the daily_revenue mart being fresh by 7am.
    depends_on:
      - ref('daily_revenue')
      - metric('daily_gross_revenue')
      - metric('daily_order_count')
      - metric('daily_avg_order_value')
    owner:
      name: Operations Team
      email: ops@jaffle.shop
    tags:
      - operations
      - alerting
      - critical
