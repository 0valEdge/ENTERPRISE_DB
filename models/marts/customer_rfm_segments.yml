version: 2

models:
  - name: customer_rfm_segments
    description: >
      Customer RFM segmentation mart. One row per customer with recency,
      frequency, and monetary scores plus a named segment label.
      Used by marketing for targeted campaign audiences.

    semantic_model:
      enabled: true

    agg_time_dimension: last_ordered_at

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "rfm_total_score = recency_score + frequency_score + monetary_score"

    columns:
      - name: customer_id
        description: Primary key — unique customer identifier.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: customer

      - name: rfm_segment
        description: Named marketing segment based on RFM score combination.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - champion
                  - loyal_customer
                  - new_customer
                  - at_risk
                  - lost
                  - potential_loyalist
        dimension:
          type: categorical

      - name: customer_type
        description: New or returning classification from the customers mart.
        dimension:
          type: categorical

      - name: last_ordered_at
        description: Date of the customer's most recent order.
        granularity: day
        dimension:
          type: time

      - name: recency_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5

      - name: frequency_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5

      - name: monetary_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5

      - name: rfm_total_score
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 3
                max_value: 15

      - name: days_since_last_order
      - name: frequency
      - name: monetary

    metrics:
      - name: champion_customers
        label: Champion Customers
        description: Count of customers in the champion RFM segment.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: "{{ Dimension('customer__rfm_segment') }} = 'champion'"

      - name: at_risk_customers
        label: At-Risk Customers
        description: Count of customers at risk of churning.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: "{{ Dimension('customer__rfm_segment') }} = 'at_risk'"

      - name: lost_customers
        label: Lost Customers
        description: Count of customers classified as lost.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: "{{ Dimension('customer__rfm_segment') }} = 'lost'"

      - name: loyal_customers
        label: Loyal Customers
        description: Count of customers classified as loyal.
        type: simple
        agg: count_distinct
        expr: customer_id
        filter: "{{ Dimension('customer__rfm_segment') }} = 'loyal_customer'"

      - name: total_rfm_customers
        label: Total RFM Customers
        description: Total number of customers with RFM scores.
        type: simple
        agg: count_distinct
        expr: customer_id
