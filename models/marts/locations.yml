version: 2

models:
  - name: locations
    description: >
      Location dimension table. One row per store location.
      Contains tax rate and opening date.

    semantic_model:
      enabled: true

    agg_time_dimension: opened_date

    columns:
      - name: location_id
        description: Primary key — unique store location identifier.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: location

      - name: location_name
        description: Human-readable store name.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: tax_rate
        description: Sales tax rate applied at this location.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1

      - name: opened_date
        description: Date the store location opened.
        granularity: day
        dimension:
          type: time

    metrics:
      - name: location_count
        label: Location Count
        description: Total number of store locations.
        type: simple
        agg: count_distinct
        expr: location_id

      - name: average_tax_rate
        label: Average Tax Rate
        description: Average sales tax rate across all locations.
        type: simple
        agg: average
        expr: tax_rate
