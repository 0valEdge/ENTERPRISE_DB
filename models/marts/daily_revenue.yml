version: 2

models:
  - name: daily_revenue
    description: >
      Daily revenue fact table. One row per day per location.
      Primary source for time-series dashboards and trend analysis.

    semantic_model:
      enabled: true

    agg_time_dimension: order_date

    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "food_revenue + drink_revenue <= gross_revenue"
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_date
              - location_id

    columns:
      - name: order_date
        description: Calendar date of orders being aggregated.
        data_tests:
          - not_null
        granularity: day
        dimension:
          type: time

      - name: location_id
        description: Foreign key to the store location.
        data_tests:
          - not_null
        entity:
          type: foreign
          name: location

      - name: location_name
        description: Store name for this day's records.
        data_tests:
          - not_null
        dimension:
          type: categorical

      - name: total_orders
        data_tests:
          - not_null
          - is_positive

      - name: unique_customers
        data_tests:
          - not_null

      - name: gross_revenue
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

      - name: total_supply_cost
      - name: gross_margin
      - name: food_revenue
      - name: drink_revenue
      - name: food_orders
      - name: drink_orders
      - name: total_items_sold
      - name: avg_order_revenue
      - name: rolling_7d_orders

    metrics:
      - name: daily_gross_revenue
        label: Daily Gross Revenue
        description: Sum of gross revenue per day.
        type: simple
        agg: sum
        expr: gross_revenue

      - name: daily_food_revenue
        label: Daily Food Revenue
        description: Sum of food revenue per day.
        type: simple
        agg: sum
        expr: food_revenue

      - name: daily_drink_revenue
        label: Daily Drink Revenue
        description: Sum of drink revenue per day.
        type: simple
        agg: sum
        expr: drink_revenue

      - name: daily_order_count
        label: Daily Order Count
        description: Sum of orders per day.
        type: simple
        agg: sum
        expr: total_orders

      - name: daily_gross_margin
        label: Daily Gross Margin
        description: Sum of gross margin per day.
        type: simple
        agg: sum
        expr: gross_margin

      - name: daily_unique_customers
        label: Daily Unique Customers
        description: Sum of unique customers per day.
        type: simple
        agg: sum
        expr: unique_customers
