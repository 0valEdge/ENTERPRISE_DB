version: 2

models:
  - name: stg_orders
    description: Order data with basic cleaning and transformation. One row per order.
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_total - tax_paid = subtotal"
    columns:
      - name: order_id
        description: Primary key — unique order identifier.
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to the customer.
        data_tests:
          - not_null
      - name: location_id
        description: Foreign key to the store location.
        data_tests:
          - not_null
      - name: ordered_at
        description: Date the order was placed (truncated to day).
        data_tests:
          - not_null
          - no_future_dates
      - name: subtotal
        data_tests:
          - not_null
          - is_positive
      - name: tax_paid
        data_tests:
          - not_null
      - name: order_total
        data_tests:
          - not_null
          - is_positive
