version: 2

models:
  - name: int_order_items_enriched
    description: Order items enriched with product info, supply costs, and derived margin metrics.
    columns:
      - name: order_item_id
        description: Primary key for order items.
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: product_price
        description: Price of the product at time of order.
        data_tests:
          - not_null
          - is_positive
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1000
      - name: gross_margin
        description: Product price minus supply cost.
      - name: gross_margin_pct
        description: Gross margin as a percentage of product price.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -100
                max_value: 100

  - name: int_customer_order_history
    description: Full order history per customer with cohort assignment and order sequencing.
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - not_null
      - name: customer_order_number
        description: Sequential order number for each customer, starting at 1.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: cohort_month
        description: Month of customer's first ever order, used for cohort analysis.
        data_tests:
          - not_null
      - name: order_customer_type
        data_tests:
          - accepted_values:
              arguments:
                values: ['new', 'returning']

  - name: int_location_performance
    description: Location-level aggregated performance metrics.
    columns:
      - name: location_id
        data_tests:
          - not_null
          - unique
      - name: total_revenue
        data_tests:
          - not_null
          - is_positive
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: gross_margin_pct
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: -100
                max_value: 100

  - name: int_daily_revenue_rollup
    description: >
      Daily revenue and order metrics rolled up by location.
      Includes a 7-day rolling order count window per location.
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "food_revenue + drink_revenue <= gross_revenue"
    columns:
      - name: order_date
        description: The date of the orders being aggregated.
        data_tests:
          - not_null
      - name: location_id
        data_tests:
          - not_null
      - name: total_orders
        data_tests:
          - not_null
          - is_positive
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: gross_revenue
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: rolling_7d_orders
        description: Rolling 7-day order count for this location.
        data_tests:
          - not_null

  - name: int_product_affinity
    description: >
      Pairs of products that are most frequently ordered together in the same order.
      Used for cross-sell analysis and combo recommendations.
    columns:
      - name: product_a_id
        data_tests:
          - not_null
      - name: product_b_id
        data_tests:
          - not_null
      - name: co_occurrence_count
        data_tests:
          - not_null
          - is_positive
      - name: affinity_rank
        data_tests:
          - not_null

  - name: int_customer_rfm
    description: >
      Customer RFM (Recency, Frequency, Monetary) scoring model.
      Each customer is scored 1-5 on each dimension and assigned a segment label.
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
      - name: recency_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
      - name: frequency_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
      - name: monetary_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 5
      - name: rfm_segment
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - champion
                  - loyal_customer
                  - new_customer
                  - at_risk
                  - lost
                  - potential_loyalist
      - name: rfm_total_score
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 3
                max_value: 15
